<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Portfolio Admin - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind Config Execution -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-dim": "#dad9e1",
                    "surface-container-low": "#f4f3fa",
                    "on-secondary-fixed-variant": "#38485d",
                    "on-primary-fixed": "#00164e",
                    "surface": "#faf8ff",
                    "on-primary-container": "#90a8ff",
                    "on-primary": "#ffffff",
                    "primary": "#00236f",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-container": "#6e2c00",
                    "error-container": "#ffdad6",
                    "error": "#ba1a1a",
                    "tertiary-fixed-dim": "#ffb691",
                    "on-error": "#ffffff",
                    "inverse-surface": "#2f3036",
                    "outline-variant": "#c5c5d3",
                    "primary-container": "#1e3a8a",
                    "tertiary-fixed": "#ffdbcb",
                    "secondary-container": "#d0e1fb",
                    "on-error-container": "#93000a",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed": "#d3e4fe",
                    "surface-container-high": "#e9e7ef",
                    "on-secondary-container": "#54647a",
                    "surface-tint": "#4059aa",
                    "primary-fixed": "#dce1ff",
                    "on-tertiary-fixed": "#341100",
                    "on-tertiary-container": "#f39461",
                    "outline": "#757682",
                    "on-background": "#1a1b21",
                    "secondary-fixed-dim": "#b7c8e1",
                    "on-secondary-fixed": "#0b1c30",
                    "secondary": "#505f76",
                    "tertiary": "#4b1c00",
                    "primary-fixed-dim": "#b6c4ff",
                    "surface-variant": "#e3e1e9",
                    "on-tertiary-fixed-variant": "#773205",
                    "surface-bright": "#faf8ff",
                    "surface-container": "#eeedf4",
                    "surface-container-highest": "#e3e1e9",
                    "background": "#faf8ff",
                    "on-primary-fixed-variant": "#264191",
                    "inverse-on-surface": "#f1f0f7",
                    "on-secondary": "#ffffff",
                    "inverse-primary": "#b6c4ff",
                    "on-surface": "#1a1b21",
                    "on-surface-variant": "#444651"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "base": "4px",
                    "container-max": "1200px",
                    "xl": "40px",
                    "gutter": "24px",
                    "2xl": "64px",
                    "lg": "24px",
                    "xs": "4px",
                    "md": "16px",
                    "sm": "8px"
            },
            "fontFamily": {
                    "label-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "display-lg": ["Inter"],
                    "headline-md": ["Inter"],
                    "display-lg-mobile": ["Inter"],
                    "headline-md-mobile": ["Inter"],
                    "title-lg": ["Inter"]
            },
            "fontSize": {
                    "label-sm": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["30px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "display-lg-mobile": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "headline-md-mobile": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "title-lg": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf8ff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card {
            box-shadow: 0 10px 25px -5px rgba(0, 35, 111, 0.05), 0 8px 10px -6px rgba(0, 35, 111, 0.05);
        }
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col justify-center items-center px-gutter overflow-hidden">
<!-- Subtle Background Elements -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-fixed/20 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -left-24 w-80 h-80 bg-secondary-fixed/30 rounded-full blur-3xl"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-[360px] z-10 fade-in">
<!-- Header / Identity -->
<div class="text-center mb-xl">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary rounded-2xl mb-md shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-[32px]" data-icon="shield_person">shield_person</span>
</div>
<h1 class="font-headline-md-mobile text-headline-md-mobile text-on-surface tracking-tight">관리자 로그인</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-xs">Portfolio Management System</p>
</div>
<!-- Login Form Card -->
<div class="login-card bg-surface-container-lowest border border-outline-variant/30 rounded-2xl p-lg">
<form action="#" class="flex flex-col gap-md" method="POST">
<!-- ID Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-xs" for="admin_id">아이디</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-[20px]" data-icon="account_circle">account_circle</span>
<input class="w-full pl-[48px] pr-md py-md bg-surface-container rounded-xl border-none focus:ring-2 focus:ring-primary/20 transition-all text-on-surface placeholder:text-outline/60 font-body-md text-body-md" id="admin_id" name="admin_id" placeholder="Admin ID" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-xs" for="admin_password">비밀번호</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-[20px]" data-icon="lock">lock</span>
<input class="w-full pl-[48px] pr-[48px] py-md bg-surface-container rounded-xl border-none focus:ring-2 focus:ring-primary/20 transition-all text-on-surface placeholder:text-outline/60 font-body-md text-body-md" id="admin_password" name="admin_password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility" id="visibility_icon">visibility</span>
</button>
</div>
</div>
<!-- Remember & Security Links -->
<div class="flex items-center justify-between mt-xs px-xs">
<label class="flex items-center gap-sm cursor-pointer select-none">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20 transition-all" type="checkbox"/>
<span class="font-label-sm text-label-sm text-on-surface-variant">보안 로그인 유지</span>
</label>
</div>
<!-- Login Button -->
<button class="mt-sm w-full bg-primary text-on-primary font-title-lg text-title-lg py-md rounded-xl shadow-md shadow-primary/20 active:scale-95 transition-transform duration-150 flex items-center justify-center gap-sm" type="submit">
                    로그인
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer / Support -->
<div class="mt-xl text-center space-y-md">
<p class="font-label-sm text-label-sm text-on-surface-variant/70">
                접속 IP: <span class="font-semibold">121.140.***.***</span>
</p>
<div class="flex items-center justify-center gap-md">
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">접근 권한 요청</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">보안 정책</a>
</div>
<p class="font-label-sm text-[12px] text-outline/50 uppercase tracking-widest mt-lg">© 2024 Portfolio Admin Panel</p>
</div>
</main>
<!-- Success/Error Feedback Mock Toast (Hidden) -->
<div class="fixed bottom-xl left-1/2 -translate-x-1/2 bg-inverse-surface text-inverse-on-surface px-lg py-md rounded-full shadow-xl flex items-center gap-md opacity-0 pointer-events-none transition-all transform translate-y-4" id="toast">
<span class="material-symbols-outlined text-primary-fixed" data-icon="error_outline">error_outline</span>
<span class="font-label-sm text-label-sm" id="toast_msg">아이디 또는 비밀번호를 확인해주세요.</span>
</div>
<script>
        function togglePassword() {
            const pwd = document.getElementById('admin_password');
            const icon = document.getElementById('visibility_icon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                pwd.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Mock interaction for visual feedback
        const form = document.querySelector('form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
            
            setTimeout(() => {
                const toast = document.getElementById('toast');
                toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '로그인 <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>';
                    toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
                }, 3000);
            }, 800);
        });
    </script>
</body></html>
